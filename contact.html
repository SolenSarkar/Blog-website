<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact MyBlog - Send message via form or connect on email, Twitter (@myblogdev), LinkedIn, GitHub. Questions welcome.">
    <meta property="og:title" content="Contact - MyBlog">
    <meta property="og:description" content="Get in touch with MyBlog developer via form or social media.">
    <meta property="og:image" content="images/profile.jpg">
    <meta property="og:url" content="https://yourdomain.com/contact.html">
    <meta property="og:type" content="website">
    <title>Contact - MyBlog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <header class="header">
        <div class="container">
            <h1 class="logo"><a href="index.html">MyBlog</a></h1>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="post.html">Posts</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="theme-icon">
                    <i class="fas fa-moon theme-moon"></i>
                    <i class="fas fa-sun theme-sun" style="display: none;"></i>
                </span>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="hero">
                <h1 class="hero-title">Get In Touch</h1>
                <p class="hero-subtitle">Send me a message or connect on social media.</p>
            </section>

            <div class="contact-grid">
                <section class="contact-form">
                    <h3>Send Message</h3>

                    <form action="#" method="POST">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                        <button type="submit" class="btn">Send Message</button>
                    </form>
                </section>
                <aside class="contact-info" data-reveal="fade-up">
                    <h3 data-reveal="fade-up">Connect With Me</h3>
                    <br>
                    <div class="contact-item">
                        <a href="mailto:hello@myblog.com" aria-label="Send email to hello@myblog.com">
                            <span class="contact-icon"><i class="fas fa-envelope"></i></span>
                            <span><strong>Email:</strong> hello@myblog.com</span>
                        </a>
                    </div>
                    <div class="contact-item">
                        <a href="https://twitter.com/myblogdev" aria-label="Follow on Twitter @myblogdev">
                            <span class="contact-icon"><i class="fab fa-x-twitter"></i></span>
                            <span><strong>Twitter:</strong> @myblogdev</span>
                        </a>
                    </div>
                    <div class="contact-item">
                        <a href="https://linkedin.com/in/myblogdev" aria-label="Connect on LinkedIn">
                            <span class="contact-icon"><i class="fab fa-linkedin-in"></i></span>
                            <span><strong>LinkedIn:</strong> /in/myblogdev</span>
                        </a>
                    </div>
                    <div class="contact-item">
                        <a href="https://github.com/myblogdev" aria-label="View GitHub profile">
                            <span class="contact-icon"><i class="fab fa-github"></i></span>
                            <span><strong>GitHub:</strong> github.com/myblogdev</span>
                        </a>
                    </div>

                </aside>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>&amp;copy; 2024 MyBlog. Built with <strong>HTML</strong>, <strong>CSS</strong>, <strong>JS</strong>.</p>
        </div>
    </footer>

    <script src="script.js"></script>


</body>

</html>
